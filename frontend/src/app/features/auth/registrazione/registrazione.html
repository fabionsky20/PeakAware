<div class="registrazione-container">
  <div class="registrazione-card">

    <div class="registrazione-hero">
      <span class="registrazione-hero-icon">⛰️</span>
      <h1>PeakAware</h1>
    </div>

    <div class="registrazione-body">
      <h2>Crea account</h2>

      <form (ngSubmit)="onRegistrazione()">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="nome@email.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="min. 6 caratteri"
            required
          />
        </div>

        <div class="form-group">
          <label for="eta">
            Età <span class="opzionale">(opzionale)</span>
          </label>
          <input
            id="eta"
            type="number"
            [(ngModel)]="eta"
            name="eta"
            placeholder="es. 25"
            min="0"
            max="120"
          />
        </div>

        @if (errore) {
          <div class="errore">{{ errore }}</div>
        }

        @if (successo) {
          <div class="successo">{{ successo }}</div>
        }

        <button type="submit" class="btn-primary" [disabled]="caricamento">
          {{ caricamento ? 'Registrazione in corso...' : 'Registrati' }}
        </button>
      </form>

      <p class="link-login">
        Hai già un account?
        <a (click)="vaiALogin()">Accedi</a>
      </p>
    </div>

  </div>
</div>
